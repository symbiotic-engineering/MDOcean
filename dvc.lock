      --command resultsRE --format-json '{\"nominalLCOE\": \"{nominalLCOE:.2f} $/kWh\"\
      , \"minLCOE\": \"{minLCOE:.2f} $/kWh\", \"powerAvgNominal\": \"{powerAvgNominal/1000:.0f}
      kW\", \"powerMaxAtMinLCOE\": \"{powerMaxAtMinLCOE/1000:.0f} kW\", \"powerAvgAtMinLCOE\"\
      : \"{powerAvgAtMinLCOE/1000:.0f} kW\", \"powerAvgAtMinCapex\": \"{powerAvgAtMinCapex/1000:.0f}
      kW\", \"powerAvgMaxPower\": \"{powerAvgMaxPower/1000:.0f} kW\", \"powerBalanced\"\
      : \"{powerBalanced/1000:.0f} kW\", \"powerWhereCusp\": \"{powerWhereCusp/1000:.0f}
      kW\", \"powerWhereNonconvexEnds\": \"{powerWhereNonconvexEnds/1000:.0f} kW\"\
      , \"dampingReactivePowerIntersect\": \"{dampingReactivePowerIntersect/1000:.0f}
      kW\", \"structMassAtMinLCOE\": \"{structMassAtMinLCOE/1000:.0f} Mg\", \"DfoptMinLCOE\"\
      : \"{DfoptMinLCOE:.1f} m\", \"forceMaxAtMinLCOE\": \"{forceMaxAtMinLCOE/1e6:.0f}
      MN\", \"surgeForceFloatAtMinLCOE\": \"{surgeForceFloatAtMinLCOE/1e6:.0f} MN\"\
      , \"surgeForceSparAtMinLCOE\": \"{surgeForceSparAtMinLCOE/1e6:.0f} MN\", \"\
      surgeForceFloatNominal\": \"{surgeForceFloatNominal/1e6:.0f} MN\", \"surgeForceSparNominal\"\
      : \"{surgeForceSparNominal/1e6:.0f} MN\", \"capexAtMinLCOE\": \"{capexAtMinLCOE/1e6:.0f}
      $M\", \"capexDesignAtMinLCOE\": \"{capexDesignAtMinLCOE/1e6:.2f} $M\", \"capexDesignNominal\"\
      : \"{capexDesignNominal/1e6:.2f} $M\", \"capexDesignMinCapex\": \"{capexDesignMinCapex/1e6:.2f}
      $M\", \"capexDesignMaxPower\": \"{capexDesignMaxPower/1e6:.2f} $M\", \"simRuntime\"\
      : \"{simRuntime*1000:.0f} ms\", \"MEEMRuntime\": \"{pctRuntimeMEEM/100*simRuntime*1000:.0f}
      ms\", \"singleObjRuntime\": \"{singleObjRuntime/60:.1f} min\", \"paretoRuntime\"\
