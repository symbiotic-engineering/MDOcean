      "minLCOE": "{minLCOE:.2f} $/kWh", "powerAvgNominal": "{powerAvgNominal/1000:.0f}
      kW", "powerMaxAtMinLCOE": "{powerMaxAtMinLCOE/1000:.0f} kW", "powerAvgAtMinLCOE":
      "{powerAvgAtMinLCOE/1000:.0f} kW", "powerAvgAtMinCapex": "{powerAvgAtMinCapex/1000:.0f}
      kW", "powerAvgMaxPower": "{powerAvgMaxPower/1000:.0f} kW", "powerBalanced":
      "{powerBalanced/1000:.0f} kW", "structMassAtMinLCOE": "{structMassAtMinLCOE/1000:.0f}
      Mg", "DfoptMinLCOE": "{DfoptMinLCOE:.1f} m", "forceMaxAtMinLCOE": "{forceMaxAtMinLCOE/1e6:.0f}
      MN", "surgeForceFloatAtMinLCOE": "{surgeForceFloatAtMinLCOE/1e6:.0f} MN", "surgeForceSparAtMinLCOE":
      "{surgeForceSparAtMinLCOE/1e6:.0f} MN", "surgeForceFloatNominal": "{surgeForceFloatNominal/1e6:.0f}
      MN", "surgeForceSparNominal": "{surgeForceSparNominal/1e6:.0f} MN", "capexAtMinLCOE":
      "{capexAtMinLCOE/1e6:.0f} $M", "capexDesignAtMinLCOE": "{capexDesignAtMinLCOE/1e6:.2f}
      $M", "capexDesignNominal": "{capexDesignNominal/1e6:.2f} $M", "capexDesignMinCapex":
      "{capexDesignMinCapex/1e6:.2f} $M", "capexDesignMaxPower": "{capexDesignMaxPower/1e6:.2f}
      $M", "simRuntime": "{simRuntime*1000:.0f} ms", "MEEMRuntime": "{pctRuntimeMEEM/100*simRuntime*1000:.0f}
      ms", "pctImproveLCOEMinLCOE": "{(nominalLCOE - minLCOE)/nominalLCOE*100:.0f}%",
      "pctImproveDesignCostMinLCOE": "{(capexDesignNominal - capexDesignAtMinLCOE)/capexDesignNominal*100:.0f}%",
      "pctImprovePowerMinLCOE": "{(powerAvgAtMinLCOE - powerAvgNominal)/powerAvgNominal*100:.0f}%",
      "pctImproveDesignCostMinCapex": "{(capexDesignNominal - capexDesignMinCapex)/capexDesignNominal*100:.0f}%",
