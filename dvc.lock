    cmd: "calkit latex from-json 'pubs/renewable-energy-mdo/numbers.json' 'results/ForceSaturationFigFunc/end.json'
      'results/Runtime/end.json' 'results/RunSingleFigFunc/end.json' --output 'pubs/renewable-energy-mdo/numeric-results.tex'
      --command resultsRE --format-json '{\"nominalLCOE\": \"{nominalLCOE:.2f} $/kWh\"\
      , \"minLCOE\": \"{minLCOE:.2f} $/kWh\", \"powerAvgNominal\": \"{powerAvgNominal/1000:.0f}
      kW\", \"powerMaxAtMinLCOE\": \"{powerMaxAtMinLCOE/1000:.0f} kW\", \"powerAvgAtMinLCOE\"\
      : \"{powerAvgAtMinLCOE/1000:.0f} kW\", \"powerAvgAtMinCapex\": \"{powerAvgAtMinCapex/1000:.0f}
      kW\", \"powerAvgMaxPower\": \"{powerAvgMaxPower/1000:.0f} kW\", \"powerBalanced\"\
      : \"{powerBalanced/1000:.0f} kW\", \"powerWhereCusp\": \"{powerWhereCusp/1000:.0f}
      kW\", \"powerWhereNonconvexEnds\": \"{powerWhereNonconvexEnds/1000:.0f} kW\"\
      , \"dampingReactivePowerIntersect\": \"{dampingReactivePowerIntersect/1000:.0f}
      kW\", \"structMassAtMinLCOE\": \"{structMassAtMinLCOE/1000:.0f} Mg\", \"DfoptMinLCOE\"\
      : \"{DfoptMinLCOE:.1f} m\", \"forceMaxAtMinLCOE\": \"{forceMaxAtMinLCOE/1e6:.0f}
      MN\", \"surgeForceFloatAtMinLCOE\": \"{surgeForceFloatAtMinLCOE/1e6:.0f} MN\"\
      , \"surgeForceSparAtMinLCOE\": \"{surgeForceSparAtMinLCOE/1e6:.0f} MN\", \"\
      surgeForceFloatNominal\": \"{surgeForceFloatNominal/1e6:.0f} MN\", \"surgeForceSparNominal\"\
      : \"{surgeForceSparNominal/1e6:.0f} MN\", \"capexAtMinLCOE\": \"{capexAtMinLCOE/1e6:.0f}
      $M\", \"capexDesignAtMinLCOE\": \"{capexDesignAtMinLCOE/1e6:.2f} $M\", \"capexDesignNominal\"\
      : \"{capexDesignNominal/1e6:.2f} $M\", \"capexDesignMinCapex\": \"{capexDesignMinCapex/1e6:.2f}
      $M\", \"capexDesignMaxPower\": \"{capexDesignMaxPower/1e6:.2f} $M\", \"simRuntime\"\
      : \"{simRuntime*1000:.0f} ms\", \"singleObjRuntime\": \"{singleObjRuntime/60:.1f}
      min\", \"paretoRuntime\": \"{paretoRuntime/60:.0f} min\", \"gradientSensRuntime\"\
      : \"{runtime_post_optim/60:.1f} min\", \"reoptimSensRuntime\": \"{runtime_re_optim/60:.0f}
      min\", \"pctImproveLCOEMinLCOE\": \"{(nominalLCOE - minLCOE)/nominalLCOE*100:.0f}%\"\
      , \"pctImproveDesignCostMinLCOE\": \"{(capexDesignNominal - capexDesignAtMinLCOE)/capexDesignNominal*100:.0f}%\"\
      , \"pctImprovePowerMinLCOE\": \"{(powerAvgAtMinLCOE - powerAvgNominal)/powerAvgNominal*100:.0f}%\"\
      , \"pctImproveDesignCostMinCapex\": \"{(capexDesignNominal - capexDesignMinCapex)/capexDesignNominal*100:.0f}%\"\
      , \"pctWorsePowerMinCapex\": \"{(powerAvgNominal - powerAvgAtMinCapex)/powerAvgNominal*100:.0f}%\"\
      , \"pctImprovePowerMaxPower\": \"{(powerAvgMaxPower - powerAvgNominal)/powerAvgNominal*100:.0f}%\"\
      , \"pctWorseDesignCostMaxPower\": \"{(capexDesignNominal - capexDesignMaxPower)/capexDesignNominal*100:.0f}%\"\
      , \"pctCostSavingsFromPTO\": \"{pctCostSavingsFromPTO:.0f}%\", \"lowestFmaxFactorMinLCOE\"\
      : \"{lowestFmaxFactorMinLCOE*100:.0f}%\", \"powerLossForceSatMinLCOE\": \"{powerLossForceSatMinLCOE:.1f}
      W\", \"pctPowerLossForceSatMinLCOE\": \"{pctPowerLossForceSatMinLCOE:.3f}%\"\
