      $M\", \"capexDesignAtMinLCOE\": \"{capexDesignAtMinLCOE/1e6:.2f} $M\"\
      , \"capexDesignNominal\": \"{capexDesignNominal/1e6:.2f} $M\", \"\
      capexDesignMinCapex\": \"{capexDesignMinCapex/1e6:.2f} $M\", \"capexDesignMaxPower\"\
      : \"{capexDesignMaxPower/1e6:.2f} $M\", \"simRuntime\": \"{simRuntime*1000:.0f}
      ms\", \"MEEMRuntime\": \"{pctRuntimeMEEM/100*simRuntime*1000:.0f}
      ms\", \"pctImproveLCOEMinLCOE\": \"{(nominalLCOE - minLCOE)/nominalLCOE*100:.0f}%\"\
      , \"pctImproveDesignCostMinLCOE\": \"{(capexDesignNominal - capexDesignAtMinLCOE)/capexDesignNominal*100:.0f}%\"\
      , \"pctImprovePowerMinLCOE\": \"{(powerAvgAtMinLCOE - powerAvgNominal)/powerAvgNominal*100:.0f}%\"\
