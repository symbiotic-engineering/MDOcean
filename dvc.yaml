stages:
  mermaid-taxonomy-pdf:
    cmd: calkit xenv -n mermaid --no-check -- -i 
      mdocean/plots/non_matlab_figs/taxonomy.mmd -o 
      mdocean/plots/non_matlab_figs/pdf/taxonomy.pdf -f
    deps:
      - mdocean/plots/non_matlab_figs/taxonomy.mmd
      - .calkit/env-locks/mermaid
    outs:
      - mdocean/plots/non_matlab_figs/pdf/taxonomy.pdf
    desc: Automatically generated from the 'mermaid-taxonomy-pdf' 
      stage in calkit.yaml. Changes made here will be overwritten.
  mermaid-taxonomy-svg:
    cmd: calkit xenv -n mermaid --no-check -- -i 
      mdocean/plots/non_matlab_figs/taxonomy.mmd -o 
      mdocean/plots/non_matlab_figs/img/taxonomy_tmp.svg
    deps:
      - mdocean/plots/non_matlab_figs/taxonomy.mmd
      - .calkit/env-locks/mermaid
    outs:
      - mdocean/plots/non_matlab_figs/img/taxonomy_tmp.svg:
          cache: false
          persist: false
    desc: Automatically generated from the 'mermaid-taxonomy-svg' 
      stage in calkit.yaml. Changes made here will be overwritten.
  reformat-mermaid-svg:
    cmd: calkit xenv -n pubs --no-check -- bash --noprofile --norc -c 
      "xmllint --format 
      mdocean/plots/non_matlab_figs/img/taxonomy_tmp.svg -o 
      mdocean/plots/non_matlab_figs/img/taxonomy.svg"
    deps:
      - mdocean/plots/non_matlab_figs/img/taxonomy_tmp.svg
      - .calkit/env-locks/pubs
    outs:
      - mdocean/plots/non_matlab_figs/img/taxonomy.svg:
          cache: false
          persist: false
    desc: Automatically generated from the 'reformat-mermaid-svg' 
      stage in calkit.yaml. Changes made here will be overwritten.
  make-drag-integral:
    cmd: matlab -noFigureWindows -batch "add_mdocean_path(); drag_fcn 
      = make_drag_integral_LUT(.01, .5, 50.01, pi/24, .1, 120); 
      save('./mdocean/inputs/drag_integral.mat','drag_fcn');"
    deps:
      - ./mdocean/simulation/modules/dynamics/make_drag_integral_LUT.m
      - ./mdocean/simulation/modules/dynamics/compute_drag_integral.m
    outs:
      - ./mdocean/inputs/drag_integral.mat
    desc: Automatically generated from the 'make-drag-integral' stage 
      in calkit.yaml. Changes made here will be overwritten.
  make-var-bounds:
    cmd: matlab -noFigureWindows -batch "add_mdocean_path(); b = 
      var_bounds(); save('./mdocean/inputs/var_bounds.mat','b');"
    deps:
      - ./mdocean/inputs/var_bounds.m
      - ./mdocean/inputs/parameters.m
      - ./mdocean/inputs/drag_integral.mat
      - ./mdocean/optimization/find_nominal_inputs.m
      - ./mdocean/plots/util/remove_underscores.m
    outs:
      - ./mdocean/inputs/var_bounds.mat
    desc: Automatically generated from the 'make-var-bounds' stage in 
      calkit.yaml. Changes made here will be overwritten.
  make-calkit-stages:
    cmd: matlab -noFigureWindows -batch "add_mdocean_path(); 
      analysis_to_calkit;"
    deps:
      - mdocean/analysis/
      - mdocean/inputs/
      - mdocean/optimization/
      - mdocean/plots/util/
      - mdocean/plots/matlab_figs/
      - mdocean/plots/all_figures.m
      - mdocean/plots/check_figures.m
      - mdocean/plots/fig_tab_pub_mapping.m
      - mdocean/plots/get_fig_tab_names.m
      - mdocean/plots/move_results_to_pubs.m
      - mdocean/simulation/
    outs:
      - calkit_stages.yaml:
          cache: false
          persist: false
    desc: Automatically generated from the 'make-calkit-stages' stage 
      in calkit.yaml. Changes made here will be overwritten.
