name: mdocean
title: MDOcean
description: Multidisciplinary Design Optimization (MDO) to optimize an 
  ocean wave energy converter (WEC).
environments:
  tex:
    kind: docker
    image: texlive/texlive:latest-full
    description: TeXlive via Docker.
  pubs:
    kind: conda
    path: pubs/environment.yaml
    python: '3.14'
  mermaid:
    kind: docker
    image: minlag/mermaid-cli:latest
    description: Mermaid CLI via Docker.
    wdir: /data
    command_mode: entrypoint
dependencies:
  - docker
  - matlab
env_vars:
  QT_QPA_PLATFORM: offscreen
parameters:
  mermaid_name:
    - taxonomy
    - mod_freq_domain_ctrl_synthesis
    - mod_freq_domain_ctrl_evaluation
pipeline:
  stages:
    mermaid-make-pdfs:
      kind: command
      environment: mermaid
      command: -i mdocean/plots/non_matlab_figs/{name}.mmd -o 
        mdocean/plots/non_matlab_figs/pdf/{name}.pdf -f
      iterate_over:
        - arg_name: name
          values:
            - parameter: mermaid_name
      inputs:
        - mdocean/plots/non_matlab_figs/{name}.mmd
      outputs:
        - mdocean/plots/non_matlab_figs/pdf/{name}.pdf
    mermaid-make-pngs:
      kind: command
      environment: mermaid
      command: -i mdocean/plots/non_matlab_figs/{name}.mmd -o 
        mdocean/plots/non_matlab_figs/img/{name}.png
      iterate_over:
        - arg_name: name
          values:
            - parameter: mermaid_name
      inputs:
        - mdocean/plots/non_matlab_figs/{name}.mmd
      outputs:
        - path: mdocean/plots/non_matlab_figs/img/{name}.png
    make-drag-integral:
      kind: matlab-command
      environment: _system
      command: add_mdocean_path(); drag_fcn = 
        make_drag_integral_LUT(.01, .5, 50.01, pi/24, .1, 120); 
        save('./mdocean/inputs/drag_integral.mat','drag_fcn');
      inputs:
        - ./mdocean/simulation/modules/dynamics/make_drag_integral_LUT.m
        - ./mdocean/simulation/modules/dynamics/compute_drag_integral.m
      outputs:
        - ./mdocean/inputs/drag_integral.mat
    make-calkit-stages:
      kind: matlab-command
      environment: _system
      command: add_mdocean_path(); analysis_to_calkit;
      inputs:
        - mdocean/analysis/
        - mdocean/inputs/
        - mdocean/optimization/
        - mdocean/plots/util/
        - mdocean/plots/matlab_figs/
        - mdocean/plots/all_figures.m
        - mdocean/plots/check_figures.m
        - mdocean/plots/fig_tab_pub_mapping.m
        - mdocean/plots/get_fig_tab_names.m
        - mdocean/plots/move_results_to_pubs.m
        - mdocean/simulation/
      outputs:
        - path: calkit_stages.yaml
          storage: git
    analysis-AllFigCompare:
      kind: matlab-command
      environment: _system
      command: add_mdocean_path(); obj=AllFigCompare; 
        obj.run_analysis();
