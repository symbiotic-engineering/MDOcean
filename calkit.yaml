    pyxdsm:
      kind: python-script
      environment: pubs
      script_path: mdocean/plots/non_matlab_figs/xdsm.py
      outputs:
        - path: mdocean/plots/non_matlab_figs/xdsm.tikz
          storage: git
        - path: mdocean/plots/non_matlab_figs/xdsm.tex
          storage: git
        - mdocean/plots/non_matlab_figs/pdf/xdsm.pdf
    move-re-results:
      kind: matlab-command
      environment: _system
      inputs:
        - results/ReadNonMatlabFigs/
        - results/DesignSpaceExploration/
        - results/Comparison/
        - results/GradientOptimFigFunc/
        - results/Multistart/
        - results/ParamSensitivities/
        - results/ParetoFigFunc/
        - results/AllFigCompare/
        - results/ParetoSweep/
        - results/Constraints/
        - results/DesignVars/
        - results/Parameters/
        - results/LocationSensitivity/
        - mdocean/plots/fig_tab_pub_mapping.m
        - mdocean/plots/move_results_to_pubs.m
        - mdocean/plots/non_matlab_figs/pdf/
      outputs:
        - pubs/renewable-energy-mdo/figs/from-matlab/
        - pubs/renewable-energy-mdo/tables/from-matlab/
      command: add_mdocean_path(); move_results_to_pubs('RE');
    move-aor-results:
      kind: matlab-command
      environment: _system
      inputs:
        - results/DragIntegral/
        - results/ReadNonMatlabFigs/
        - results/SparHydro/
        - results/DescFcns/
        - results/RunSingleFigFunc/
        - results/Wecsim/
        - results/HydroCoeffFigFunc/
        - results/Validation/
        - results/Runtime/
        - results/DampingPlateStructures/
        - results/ForceSaturationFigFunc/
        - results/DesignSpaceExploration/
        - results/Meem/
        - results/QPCircles/
        - results/Slamming/
        - results/SweepGeoms/
        - results/Cost/
        - results/Validation/
        - mdocean/plots/fig_tab_pub_mapping.m
        - mdocean/plots/move_results_to_pubs.m
        - mdocean/plots/non_matlab_figs/pdf/
      outputs:
        - pubs/applied-ocean-research-model/figs/from-matlab/
        - pubs/applied-ocean-research-model/tables/from-matlab/
      command: add_mdocean_path(); move_results_to_pubs('AOR');
    aor-results-to-latex:
      kind: json-to-latex
      inputs:
        # - results/Cost/end.json
        # - results/DampingPlateStructures/end.json
        # - results/DescFcns/end.json
        # - results/DesignSpaceExploration/end.json
        # - results/ForceSaturationFigFunc/end.json
        # - results/HydroCoeffFigFunc/end.json
        # - results/Meem/end.json
        - results/Parameters/end.json
        # - results/ReadNonMatlabFigs/end.json
        - results/RunSingleFigFunc/end.json
        - results/Runtime/end.json
        # - results/Slamming/end.json
        # - results/SparHydro/end.json
        # - results/Validation/end.json
        - results/Wecsim/end.json
      outputs:
        - path: pubs/applied-ocean-research-model/numeric-results.tex
          storage: git
      command_name: results
      format:
        # LCOE
        nominalLCOE: "{nominalLCOE:.2f} $/kWh"
        # forces
        surgeForceFloatNominal: "{surgeForceFloatNominal/1e6:.0f} MN"
        surgeForceSparNominal: "{surgeForceSparNominal/1e6:.0f} MN"
        # runtimes
        simRuntime: "{simRuntime*1000:.0f} ms"
        MEEMRuntime: "{pctRuntimeMEEM/100*simRuntime*1000:.0f} ms"
        # percentages
        pctRuntimeMEEM: "{pctRuntimeMEEM:.0f}%"
        pctRuntimeDynamics: "{pctRuntimeDynamics:.0f}%"
        pctRuntimeOther: "{pctRuntimeOther:.0f}%"
        wecsimAvgPowerErrorBestCase: "{wecsimAvgPowerErrorBestCase:.2f}%"
        wecsimAvgPowerErrorWorstCase: "{wecsimAvgPowerErrorWorstCase:.2f}%"
    re-results-to-latex:
      kind: json-to-latex
      inputs:
        # - results/AllFigCompare/end.json
        - results/Comparison/end.json
        # - results/Constraints/end.json
        # - results/DesignSpaceExploration/end.json
        # - results/DesignVars/end.json
        - results/GradientOptimFigFunc/end.json
        # - results/LocationSensitivity/end.json
        # - results/Multistart/end.json
        # - results/ParamSensitivities/end.json
        # - results/Parameters/end.json
        # - results/ParetoFigFunc/end.json
        # - results/ParetoSweep/end.json
        # - results/ReadNonMatlabFigs/end.json
      outputs:
        - path: pubs/renewable-energy-mdo/numeric-results.tex
          storage: git
      command_name: results
      format:
        # LCOE
        nominalLCOE: "{nominalLCOE:.2f} $/kWh"
        minLCOE: "{minLCOE:.2f} $/kWh"
        # powers
        powerAvgNominal: "{powerAvgNominal/1000:.0f} kW"
        powerMaxAtMinLCOE: "{powerMaxAtMinLCOE/1000:.0f} kW"
        powerAvgAtMinLCOE: "{powerAvgAtMinLCOE/1000:.0f} kW"
        powerAvgAtMinCapex: "{powerAvgAtMinCapex/1000:.0f} kW"
        powerAvgMaxPower: "{powerAvgMaxPower/1000:.0f} kW"
        powerBalanced: "{powerBalanced/1000:.0f} kW"
        # masses
        structMassAtMinLCOE: "{structMassAtMinLCOE/1000:.0f} Mg"
        # dimensions
        DfoptMinLCOE: "{DfoptMinLCOE:.1f} m"
        # forces
        forceMaxAtMinLCOE: "{forceMaxAtMinLCOE/1e6:.0f} MN"
        surgeForceFloatAtMinLCOE: "{surgeForceFloatAtMinLCOE/1e6:.0f} MN"
        surgeForceSparAtMinLCOE: "{surgeForceSparAtMinLCOE/1e6:.0f} MN"
        surgeForceFloatNominal: "{surgeForceFloatNominal/1e6:.0f} MN"
        surgeForceSparNominal: "{surgeForceSparNominal/1e6:.0f} MN"
        # costs
        capexAtMinLCOE: "{capexAtMinLCOE/1e6:.0f} $M"
        capexDesignAtMinLCOE: "{capexDesignAtMinLCOE/1e6:.2f} $M"
        capexDesignNominal: "{capexDesignNominal/1e6:.2f} $M"
        capexDesignMinCapex: "{capexDesignMinCapex/1e6:.2f} $M"
        capexDesignMaxPower: "{capexDesignMaxPower/1e6:.2f} $M"
        # runtimes
        simRuntime: "{simRuntime*1000:.0f} ms"
        # percent changes
        pctImproveLCOEMinLCOE: "{(nominalLCOE - minLCOE)/nominalLCOE*100:.0f}%"
        pctImproveDesignCostMinLCOE: "{(capexDesignNominal - capexDesignAtMinLCOE)/capexDesignNominal*100:.0f}%"
        pctImprovePowerMinLCOE: "{(powerAvgAtMinLCOE - powerAvgNominal)/powerAvgNominal*100:.0f}%"
        pctImproveDesignCostMinCapex: "{(capexDesignNominal - capexDesignMinCapex)/capexDesignNominal*100:.0f}%"
        pctWorsePowerMinCapex: "{(powerAvgNominal - powerAvgAtMinCapex)/powerAvgNominal*100:.0f}%"
        pctImprovePowerMaxPower: "{(powerAvgMaxPower - powerAvgNominal)/powerAvgNominal*100:.0f}%"
        pctWorseDesignCostMaxPower: "{(capexDesignNominal - capexDesignMaxPower)/capexDesignNominal*100:.0f}%"
        # percentages
        pctCostSavingsFromPTO: "{pctCostSavingsFromPTO:.0f}%"
    copy-bib:
      kind: map-paths
      paths:
        - src: pubs/renewable-energy-mdo/references.bib
          dest: pubs/applied-ocean-research-model/references.bib
          kind: file-to-file
    build-RE-paper:
      kind: latex
      target_path: pubs/renewable-energy-mdo/mdocean.tex
      environment: tex
      latexmkrc_path: pubs/renewable-energy-mdo/.latexmkrc
      inputs:
        - pubs/renewable-energy-mdo/figs/from-matlab/
        - pubs/renewable-energy-mdo/sections/
        - pubs/renewable-energy-mdo/tables/
        - pubs/renewable-energy-mdo/references.bib
        - pubs/renewable-energy-mdo/numbers.tex
        - pubs/renewable-energy-mdo/numeric-results.tex
        - pubs/elsarticle-num-names.bst
      outputs:
        - pubs/renewable-energy-mdo/mdocean.pdf
        - path: pubs/renewable-energy-mdo/mdocean.synctex.gz
          storage: null
        - path: pubs/renewable-energy-mdo/aux/
          storage: null
          delete_before_run: false
    build-AOR-paper:
      kind: latex
      target_path: pubs/applied-ocean-research-model/main.tex
      environment: tex
      latexmkrc_path: pubs/applied-ocean-research-model/.latexmkrc
      inputs:
        - pubs/applied-ocean-research-model/sections/
        - pubs/applied-ocean-research-model/figs/from-matlab/
        - pubs/applied-ocean-research-model/figs/manual/
        - pubs/applied-ocean-research-model/figs/tikz/
        - pubs/applied-ocean-research-model/tables/
        - pubs/applied-ocean-research-model/main.tex
        - pubs/applied-ocean-research-model/numbers.tex
        - pubs/applied-ocean-research-model/numeric-results.tex
        - pubs/elsarticle-num-names.bst
        - pubs/applied-ocean-research-model/references.bib
      outputs:
        - pubs/applied-ocean-research-model/main.pdf
        - path: pubs/applied-ocean-research-model/main.synctex.gz
          storage: null
        - path: pubs/applied-ocean-research-model/aux/
          storage: null
          delete_before_run: false
    build-UMERC-paper:
      kind: latex
      target_path: pubs/UMERC-2025-grid-value/UMERC_2025_grid_value.tex
      environment: tex
      inputs:
        - pubs/UMERC-2025-grid-value/figures/
        - pubs/UMERC-2025-grid-value/references.bib
        - pubs/UMERC-2025-grid-value/logo.jpg
      outputs:
        - pubs/UMERC-2025-grid-value/UMERC_2025_grid_value.pdf
    view-aor-figs:
      kind: jupyter-notebook
      environment: pubs
      notebook_path: pubs/applied-ocean-research-model/view_figs.ipynb
      inputs:
        - pubs/applied-ocean-research-model/figs/
      html_storage: null
      executed_ipynb_storage: git
publications:
  - path: pubs/applied-ocean-research-model/main.pdf
    title: Modeling - Journal (Applied Ocean Research)
    description: Development, Validation, and Benchmarking of a 
      Multidisciplinary Semi-Analytical Model for Wave Energy Converters
    kind: journal-article
    stage: build-AOR-paper
  - path: pubs/renewable-energy-mdo/mdocean.pdf
