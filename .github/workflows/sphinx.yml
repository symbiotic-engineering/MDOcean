name: "Sphinx: Render docs"

on:
  pull_request:
    paths:
      - 'docs/**'
      - '.github/workflows/sphinx.yml'
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false
    - name: Determine docs root behavior
      id: docvars
      run: |
        if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_NAME}" == "main" ]]; then
          echo "root_flag=-r main" >> $GITHUB_OUTPUT
        else
          echo "root_flag=" >> $GITHUB_OUTPUT
        fi
    - name: Build HTML
      uses: ammaraskar/sphinx-action@8.2.3
      with:
        build-command: sphinx-versioning build ${{ steps.docvars.outputs.root_flag }} -b html docs/ docs/_build/html
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: html-docs
        path: docs/_build/html/
    - name: Deploy # this pushes to the gh-pages branch, so Github's pages workflow will pick it up and create the website
      uses: peaceiris/actions-gh-pages@v4
      if: github.ref == 'refs/heads/main'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: docs/_build/html