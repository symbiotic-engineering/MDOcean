name: Run calkit pipeline

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
# env:
  # MLM_LICENSE_TOKEN: ${{ secrets.MatlabBatchToken }}
  # MLM_LICENSE_FILE: ${{ secrets.MATLAB_LICENSE_FILE }}:27000
permissions:
  contents: write

# Make sure we only ever run one per branch so we don't have issues pushing
# after running the pipeline
concurrency:
  group: calkit-run-${{ github.ref }}
  cancel-in-progress: false

jobs:
  main:
    name: Run
    runs-on: self-hosted
    timeout-minutes: 1440 # 24 hours
    steps:
      - uses: actions/checkout@v6
        with:
          # For PRs, checkout the head ref to avoid detached HEAD
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: true
          persist-credentials: false
      - name: Configure Git credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git remote set-url origin https://github-actions[bot]:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
      - name: Setup uv
        uses: astral-sh/setup-uv@v5
      - name: Install Calkit
        run: uv tool install --upgrade calkit-python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install python dependencies
        run: pip install ruamel.yaml
      # - name: Setup matlab
      #   uses: matlab-actions/setup-matlab@v2
      #   with:
      #     cache: true
      #     release: R2024b
      #     products: >
      #       Parallel_Computing_Toolbox
      #       Global_Optimization_Toolbox
      #       Optimization_Toolbox
      #       Statistics_and_Machine_Learning_Toolbox
      #       MATLAB_Report_Generator
      #       Simulink
      #       Simscape
      #       Simscape_Multibody
      - name: Add MATLAB to PATH
        run: echo "/usr/local/MATLAB/R2024b/bin" >> $GITHUB_PATH
      # - name: test matlab can run
      #   run: matlab -batch "disp('Matlab is working')"
      # - name: test matlab license server
      #   run: | # Mask the license server IP address in logs
      #     echo "::add-mask::$(dig +short ${{ secrets.MATLAB_LICENSE_FILE }} | tail -n 1)" 
      #     curl -v --max-time 5 telnet://${{ env.MLM_LICENSE_FILE }}
      #   if: always()
      - name: Generate calkit_stages.yaml
        uses: calkit/run-action@v2
        with:
          dvc_token: ${{ secrets.CALKIT_DVC_TOKEN }}
          run_args: make-calkit-stages
          save: false
      - name: Use calkit_stages.yaml to update calkit.yaml
        run: python mdocean/analysis/update_calkit.py

      - name: Run Calkit
        id: run_calkit
        continue-on-error: true
        uses: calkit/run-action@v2
        with:
          dvc_token: ${{ secrets.CALKIT_DVC_TOKEN }}
          run_args: --keep-going --log build-AOR-paper
          save: false
      - name: calkit save
        run: |
          if ! git status --porcelain | grep -vE '^.. \.calkit/' | grep -q . && dvc status -q --no-updates; then
            exit 0    # Exit without saving if nothing changed, or if the only changes are in .calkit/
          fi
  
          set +e # Continue even if pull fails
          git pull --recurse-submodules
          PULL_STATUS=$?

          if [ $PULL_STATUS -ne 0 ]; then
            BRANCH="calkit-run-${{github.run_number}}-${{github.run_id}}"
            echo "Pull failed due to merge conflict. Creating a new branch $BRANCH."
            git checkout -b "$BRANCH"
            # git config below does the equivalent of the --set-upstream option of git push
            git config branch."$BRANCH".remote origin
            git config branch."$BRANCH".merge refs/heads/"$BRANCH"
          fi

          calkit dvc pull
          calkit save dvc.lock dvc.yaml .calkit/ calkit.yaml calkit_stages.yaml pubs/applied-ocean-research-model/numeric-results.tex pubs/renewable-energy-mdo/numeric-results.tex mdocean/plots/non_matlab_figs/img/taxonomy.svg mdocean/plots/non_matlab_figs/xdsm.tikz mdocean/plots/non_matlab_figs/xdsm.tex results/**/end.json results/**/*.tex -m "Run pipeline"
          PUSH_STATUS=$?

          if [ $PUSH_STATUS -ne 0 ]; then
            echo "Push failed, perhaps due to dvc push timeout. Retrying."
            calkit dvc push
            git push
          fi
      - run: |
          echo "Errors from latex:"
          grep -E "^!" pubs/applied-ocean-research-model/aux/main.log || true
          grep -E "^!" pubs/renewable-energy-mdo/aux/mdocean.log || true

      - name: Publish code coverage to codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          fail_ci_if_error: true
          directory: code-coverage
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Publish test report to codecov
        uses: codecov/test-results-action@v1
        if: always()
        with:
          fail_ci_if_error: true
          directory: test-results
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Publish test report to GitHub UI
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          report_paths: 'test-results/**/junit.xml'
          job_name: main

      - name: Upload test report PDF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: |
            test-results/**/junit.xml
            test-results/**/testreport.pdf
            test-results/**/table_*.tex
            code-coverage/**/coverage.xml
            **/DynamicValidation_*.pdf
            test-results/Figure_*.pdf
            mdocean/optimization/multiobjective/pareto_search_results_*.mat
            **/wecsim_*.mat

      - name: Get baseline test results (for PR, use base branch, for non-PR, use main branch)
        if: always()
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.event_name == 'pull_request' && github.base_ref || 'main' }}
          path: test-results-baseline
          workflow_conclusion: completed
          check_artifacts: true

      - name: Compare test results to base branch
        if: always()
        run: |
          ls test-results-baseline/test-report/test-results || echo 'No baseline test results found'
          python tests/junit_regression.py test-results-baseline/test-report/test-results/**/junit.xml test-results/**/junit.xml test-results-baseline/delta-junit.xml
          cat test-results-baseline/delta-junit.xml
        shell: bash

      - name: Publish changed tests to GitHub UI
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: 'test-results-baseline/delta-junit.xml'
          check_name: 'Changed Tests'
          job_name: main
          include_passed: true
