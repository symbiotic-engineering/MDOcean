name: Run calkit pipeline

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
# env:
  # MLM_LICENSE_TOKEN: ${{ secrets.MatlabBatchToken }}
  # MLM_LICENSE_FILE: ${{ secrets.MATLAB_LICENSE_FILE }}:27000
permissions:
  contents: write
  checks: write
  id-token: write

# Make sure we only ever run one per branch so we don't have issues pushing
# after running the pipeline
concurrency:
  group: calkit-run-${{ github.ref }}
  cancel-in-progress: false

jobs:
  main:
    name: Run
    runs-on: self-hosted
    timeout-minutes: 1440 # 24 hours
    steps:
      - name: Setup temp environment
        shell: bash
        run: |
          set -euo pipefail

          export TMPDIR="${RUNNER_TEMP}/matlab-${GITHUB_RUN_ID}"
          mkdir -p "$TMPDIR"
          echo "TMPDIR=$TMPDIR" >> $GITHUB_ENV
      - name: Clear stale submodule caches
        run: |
          # Deinit any previously-initialized submodules first (while their gitdirs
          # still exist) so that actions/checkout's auth-setup foreach won't try to
          # traverse into stale submodule directories and fail.
          git submodule deinit --all --force 2>/dev/null || true
          # Now remove the entire gitdir module cache so the next manual init starts clean.
          rm -rf .git/modules 2>/dev/null || true
      - uses: actions/checkout@v6
        with:
          # For PRs, checkout the head ref to avoid detached HEAD
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          # Use submodules: false so actions/checkout does NOT run
          # `git submodule update --init --recursive` (which would register
          # OpenFLASH's nested sea-lab-utils submodule) and does NOT run
          # `git submodule foreach --recursive` for auth removal (which would
          # then fail with "No url found" for that nested submodule).
          submodules: false
          persist-credentials: false
      - name: Init submodules
        run: git submodule update --init --recursive
      - name: Configure Git credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git remote set-url origin https://github-actions[bot]:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - name: Install Calkit
        run: uv tool install --upgrade calkit-python
      - name: Setup jq
        uses: dcarbone/install-jq-action@v3
      - name: Add docstrings to .m files
        run: |
          # Snapshot which stages are already stale before touching any .m files
          STALE_BEFORE=$(dvc status --json 2>/dev/null || echo '{}')
          STALE_BEFORE_STAGES=$(echo "$STALE_BEFORE" | jq -r 'keys[]')
          echo "Stages stale before docstrings:"
          echo "${STALE_BEFORE_STAGES:-<none>}"

          # Run docstring generation
          uv run python dev/docs/add_docstrings.py

          # Snapshot which stages are stale after docstring changes
          STALE_AFTER=$(dvc status --json 2>/dev/null || echo '{}')
          STALE_AFTER_STAGES=$(echo "$STALE_AFTER" | jq -r 'keys[]')
          echo "Stages stale after docstrings:"
          echo "${STALE_AFTER_STAGES:-<none>}"

          # Find stages that became stale solely due to docstring changes
          # (clean before, stale after); skip stages that were already dirty
          NEWLY_STALE_STAGES=()
          while IFS= read -r stage; do
            [ -z "$stage" ] && continue
            if ! echo "$STALE_BEFORE_STAGES" | grep -qxF "$stage"; then
              NEWLY_STALE_STAGES+=("$stage")
            fi
          done <<< "$STALE_AFTER_STAGES"

          if [ ${#NEWLY_STALE_STAGES[@]} -gt 0 ]; then
            echo "Force-committing DVC stages newly dirtied by docstrings: ${NEWLY_STALE_STAGES[*]}"
            calkit dvc commit "${NEWLY_STALE_STAGES[@]}"
            git add dvc.lock '*.m'
            git diff --cached --quiet || git commit -m "Update docstrings and force-commit dvc stages"
          else
            echo "No stages newly dirtied by docstring generation."
          fi
      # - name: Setup matlab
      #   uses: matlab-actions/setup-matlab@v2
      #   with:
      #     cache: true
      #     release: R2024b
      #     products: >
      #       Parallel_Computing_Toolbox
      #       Global_Optimization_Toolbox
      #       Optimization_Toolbox
      #       Statistics_and_Machine_Learning_Toolbox
      #       MATLAB_Report_Generator
      #       Simulink
      #       Simscape
      #       Simscape_Multibody
      - name: Add MATLAB to PATH
        run: echo "/usr/local/MATLAB/R2024b/bin" >> $GITHUB_PATH
      # - name: test matlab can run
      #   run: matlab -batch "disp('Matlab is working')"
      # - name: test matlab license server
      #   run: | # Mask the license server IP address in logs
      #     echo "::add-mask::$(dig +short ${{ secrets.MATLAB_LICENSE_FILE }} | tail -n 1)" 
      #     curl -v --max-time 5 telnet://${{ env.MLM_LICENSE_FILE }}
      #   if: always()
      - name: Generate calkit_stages.yaml
        uses: calkit/run-action@v2
        with:
          dvc_token: ${{ secrets.CALKIT_DVC_TOKEN }}
          run_args: make-calkit-stages
          save: false
          cache_dvc: false
      - name: Use calkit_stages.yaml to update calkit.yaml
        run: uv run --with ruamel.yaml python mdocean/analysis/update_calkit.py
      - name: add any newly generated .ipynb files to git
        run: git add results/fig_notebooks/*.ipynb
      - name: Run Calkit
        id: run_calkit
        continue-on-error: true
        uses: calkit/run-action@v2
        with:
          dvc_token: ${{ secrets.CALKIT_DVC_TOKEN }}
          # render-quarto-pdf
          run_args: --keep-going --log build-AOR-paper view-aor-figs view-re-figs build-RE-paper all-viz test-aor test-re check-dup-json-keys
          pull_dvc: false
          save: false
          cache_dvc: false
      - name: calkit save
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && \
             [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "Fork PR detected – skipping save/push"
            exit 0
          fi

          if ! git status --porcelain | grep -vE '^.. \.calkit/' | grep -q . && dvc status -q --no-updates; then
            exit 0    # Exit without saving if nothing changed, or if the only changes are in .calkit/
          fi
  
          set +e # Continue even if pull fails
          PULL_OUTPUT=$(git pull --recurse-submodules 2>&1)
          PULL_STATUS=$?

          if [ $PULL_STATUS -ne 0 ] && ! echo "$PULL_OUTPUT" | grep -q 'not our ref'; then
            BRANCH="calkit-run-${{github.run_number}}-${{github.run_id}}"
            echo "Pull failed due to merge conflict. Creating a new branch $BRANCH."
            git checkout -b "$BRANCH"
            # git config below does the equivalent of the --set-upstream option of git push
            git config branch."$BRANCH".remote origin
            git config branch."$BRANCH".merge refs/heads/"$BRANCH"
          fi

          calkit dvc pull
          calkit save dvc.lock dvc.yaml .calkit/ calkit.yaml calkit_stages.yaml pubs/applied-ocean-research-model/numeric-results.tex pubs/renewable-energy-mdo/numeric-results.tex mdocean/plots/non_matlab_figs/img/taxonomy.svg mdocean/plots/non_matlab_figs/xdsm.tikz mdocean/plots/non_matlab_figs/xdsm.tex results/**/end.json results/**/*.tex '*.m' -m "Run pipeline"
          PUSH_STATUS=$?

          if [ $PUSH_STATUS -ne 0 ]; then
            echo "Push failed, perhaps due to dvc push timeout. Retrying."
            calkit dvc push
            git push || true
          fi
      - run: |
          echo "Errors from latex:"
          grep -E "^!" pubs/applied-ocean-research-model/aux/main.log || true
          grep -E "^!" pubs/renewable-energy-mdo/aux/mdocean.log || true

      - name: Publish code coverage to codecov
        uses: codecov/codecov-action@v5
        if: always()
        with:
          fail_ci_if_error: true
          directory: code-coverage
          token: ${{ secrets.CODECOV_TOKEN }}
          use_oidc: true

      - name: Publish test report to codecov
        uses: codecov/codecov-action@v5
        if: always()
        with:
          fail_ci_if_error: true
          directory: test-results
          report_type: test_results
          token: ${{ secrets.CODECOV_TOKEN }}
          use_oidc: true

      - name: Publish test report to GitHub UI
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: 'test-results/**/junit.xml'
          job_name: main

      - name: Upload test report PDF
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-report
          path: |
            test-results/**/junit.xml
            test-results/**/testreport.pdf
            test-results/**/table_*.tex
            code-coverage/**/coverage.xml
            **/DynamicValidation_*.pdf
            test-results/Figure_*.pdf
            mdocean/optimization/multiobjective/pareto_search_results_*.mat
            **/wecsim_*.mat

      - name: Get baseline test results (for PR, use base branch, for non-PR, use main branch)
        if: always()
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v20
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.event_name == 'pull_request' && github.base_ref || 'main' }}
          path: test-results-baseline
          workflow_conclusion: completed
          check_artifacts: true
          allow_forks: true

      - name: Compare test results to base branch
        if: always()
        continue-on-error: true
        run: |
          if ls test-results-baseline/test-report/test-results 2>/dev/null; then
            python tests/junit_regression.py test-results-baseline/test-report/test-results/**/junit.xml test-results/**/junit.xml test-results-baseline/delta-junit.xml
            cat test-results-baseline/delta-junit.xml
          else
            echo 'No baseline test results found, skipping comparison'
          fi
        shell: bash

      - name: Publish changed tests to GitHub UI
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: 'test-results-baseline/delta-junit.xml'
          check_name: 'Changed Tests'
          job_name: main
          include_passed: true

      - name: Clean up temp environment
        if: always()
        shell: bash
        run: |
          echo "Cleaning up temp environment..."
          rm -rf "$TMPDIR" || true
