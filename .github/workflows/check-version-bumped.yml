name: Check version + changelog updated
on:
  pull_request:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check for changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            version:
                - 'mdocean/__version__.py'
            changelog:
                - 'CHANGELOG.md'
      - name: Fail if version/changelog not bumped
        if: steps.changes.outputs.version == 'false' || steps.changes.outputs.changelog == 'false'
        run: exit 1
  update-calkit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: pip install ruamel.yaml
      - name: Update calkit stages
        run: |
          if [ -f calkit_stages.yaml ]; then
            python mdocean/analysis/update_calkit.py --yes
          else
            echo "calkit_stages.yaml not found (needs MATLAB to generate); skipping."
          fi