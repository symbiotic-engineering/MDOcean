name: Create GitHub Release

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: 'v$(cat mdocean/__version__.py | grep __version__ | cut -d "\"" -f2)'
          generate_release_notes: true